{% extends "base.html" %}
{% block content %}
  {% if cocktail %}
    <h1>{{ cocktail.name }}</h1>
    <div class="card">
      <ul class="item-list">
        {% for line in cocktail.ingredients %}
          <li>{{ line }}</li>
        {% endfor %}
      </ul>
      <p style="margin-bottom: 0;">{{ cocktail.instructions }}</p>
    </div>
  {% else %}
    <h1>Not found</h1>
    <p class="empty-state">No cocktail named "{{ name }}".</p>
  {% endif %}
  <p class="help-link"><a href="{{ url_for('dashboard') }}">Back to dashboard</a></p>
{% endblock %}
