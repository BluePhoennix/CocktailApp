{% extends "base.html" %}
{% block content %}
  <h1>Your inventory</h1>

  <form method="post" class="inline-row">
    <input type="text" name="name" placeholder="Ingredient name" required>
    <button type="submit" name="action" value="add">Add</button>
  </form>

  <div class="card">
    {% if items %}
      <ul class="item-list">
        {% for item in items %}
          <li>
            <span>{{ item }}</span>
            <form class="inline" method="post">
              <input type="hidden" name="name" value="{{ item }}">
              <button class="remove-btn" type="submit" name="action" value="remove">Remove</button>
            </form>
          </li>
        {% endfor %}
      </ul>
    {% else %}
      <p class="empty-state">Your inventory is empty.</p>
    {% endif %}
  </div>
{% endblock %}
