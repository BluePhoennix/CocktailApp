{% extends "base.html" %}
{% block content %}
  <h1>Search cocktails</h1>
  <form method="get" class="inline-row">
    <input type="text" name="q" value="{{ query }}" placeholder="Cocktail name">
    <button type="submit">Search</button>
  </form>

  {% if query %}
    <div class="card">
      {% if results %}
        <ul class="item-list">
          {% for name in results %}
            <li><a href="{{ url_for('cocktail_detail', name=name) }}">{{ name }}</a></li>
          {% endfor %}
        </ul>
      {% else %}
        <p class="empty-state">No cocktails matched "{{ query }}".</p>
      {% endif %}
    </div>
  {% endif %}
{% endblock %}
