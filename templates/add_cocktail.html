{% extends "base.html" %}
{% block content %}
  <h1>Add a cocktail</h1>
  <div class="card">
    <form method="post" class="stack">
      <input type="text" name="name" placeholder="Cocktail name" required>

      <div id="ingredient-rows">
        <div class="ingredient-input-row">
          <input type="text" name="ingredient_name" placeholder="Ingredient">
          <input type="text" name="ingredient_amount" placeholder="Amount">
          <button type="button" class="secondary remove-row-btn" onclick="this.parentElement.remove()">✕</button>
        </div>
        <div class="ingredient-input-row">
          <input type="text" name="ingredient_name" placeholder="Ingredient">
          <input type="text" name="ingredient_amount" placeholder="Amount">
          <button type="button" class="secondary remove-row-btn" onclick="this.parentElement.remove()">✕</button>
        </div>
      </div>
      <button type="button" class="secondary" onclick="addIngredientRow()">+ Add ingredient</button>

      <textarea name="instructions" placeholder="Instructions" rows="4" required></textarea>

      <button type="submit">Save cocktail</button>
    </form>
  </div>
  <p class="help-link"><a href="{{ url_for('dashboard') }}">Back to dashboard</a></p>

  <script>
    function addIngredientRow() {
      const container = document.getElementById("ingredient-rows");
      const row = document.createElement("div");
      row.className = "ingredient-input-row";
      row.innerHTML =
        '<input type="text" name="ingredient_name" placeholder="Ingredient">' +
        '<input type="text" name="ingredient_amount" placeholder="Amount">' +
        '<button type="button" class="secondary remove-row-btn" onclick="this.parentElement.remove()">✕</button>';
      container.appendChild(row);
    }
  </script>
{% endblock %}
